services:
  mysql:
    image: mysql:8.4
    container_name: wireless-sim-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wireless_sim
      MYSQL_USER: wireless
      MYSQL_PASSWORD: wireless_dev
      MYSQL_ROOT_PASSWORD: root_dev
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - wireless-sim-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  rabbitmq:
    image: rabbitmq:4.3.2-management
    container_name: wireless-sim-rabbitmq
    hostname: wireless-sim-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: wireless
      RABBITMQ_DEFAULT_PASS: wireless_dev
      RABBITMQ_DEFAULT_VHOST: wireless_sim
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - wireless-sim-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.4.2-alpine
    container_name: wireless-sim-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - wireless_dev
      - --save
      - ""
      - --appendonly
      - "no"
    environment:
      TZ: Asia/Shanghai
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "wireless_dev", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  wireless-sim-mysql-data:
  wireless-sim-rabbitmq-data:
