spring:
  application:
    name: wireless-sim-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:13306/wireless_sim?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:wireless}
    password: ${DB_PASSWORD:wireless_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:wireless}
    password: ${RABBITMQ_PASSWORD:wireless_dev}
    virtual-host: ${RABBITMQ_VHOST:wireless_sim}
    connection-timeout: 5s
    requested-heartbeat: ${RABBITMQ_HEARTBEAT:30s}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: false
    listener:
      type: simple
      simple:
        acknowledge-mode: manual
        concurrency: 2
        max-concurrency: 2
        prefetch: 1
        default-requeue-rejected: false
        missing-queues-fatal: true
        retry:
          enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:wireless_dev}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100

app:
  security:
    jwt:
      issuer: wireless-sim-platform
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:30m}
      secret-base64: ${JWT_SECRET_BASE64:}

simulation:
  redis:
    enabled: ${SIMULATION_REDIS_ENABLED:true}
    task-detail-ttl: ${SIMULATION_REDIS_TASK_DETAIL_TTL:5s}
    rate-limit:
      window: ${SIMULATION_REDIS_RATE_LIMIT_WINDOW:60s}
      max-submissions: ${SIMULATION_REDIS_RATE_LIMIT_MAX_SUBMISSIONS:5}
  outbox:
    enabled: ${SIMULATION_OUTBOX_ENABLED:true}
    scan-interval: ${SIMULATION_OUTBOX_SCAN_INTERVAL:1s}
    batch-size: ${SIMULATION_OUTBOX_BATCH_SIZE:20}
    lease-duration: ${SIMULATION_OUTBOX_LEASE_DURATION:2m}
    confirm-timeout: ${SIMULATION_OUTBOX_CONFIRM_TIMEOUT:5s}
    retry-base-delay: ${SIMULATION_OUTBOX_RETRY_BASE_DELAY:5s}
    retry-max-delay: ${SIMULATION_OUTBOX_RETRY_MAX_DELAY:5m}
  execution:
    enabled: ${SIMULATION_EXECUTION_ENABLED:true}
    dispatch-mode: ${SIMULATION_DISPATCH_MODE:rabbitmq}
    core-pool-size: ${SIMULATION_CORE_POOL_SIZE:2}
    max-pool-size: ${SIMULATION_MAX_POOL_SIZE:2}
    queue-capacity: ${SIMULATION_QUEUE_CAPACITY:20}
    dispatch-interval-ms: ${SIMULATION_DISPATCH_INTERVAL_MS:1000}
    dispatch-batch-size: ${SIMULATION_DISPATCH_BATCH_SIZE:20}
    step-delay-ms: ${SIMULATION_STEP_DELAY_MS:200}
    recovery-scan-interval-ms: ${SIMULATION_RECOVERY_SCAN_INTERVAL_MS:10000}
    heartbeat-timeout-seconds: ${SIMULATION_HEARTBEAT_TIMEOUT_SECONDS:30}
    worker-mode: ${SIMULATION_WORKER_MODE:java-mock}
  worker-api:
    token: ${SIMULATION_WORKER_TOKEN:}
    model-id: ${SIMULATION_GRPO_MODEL_ID:grpo-rsma-throughput-v1}
    evaluation-episodes: ${SIMULATION_GRPO_EVALUATION_EPISODES:10}
  messaging:
    consumer-enabled: ${SIMULATION_MESSAGE_CONSUMER_ENABLED:true}
    retry-delay: ${SIMULATION_MESSAGE_RETRY_DELAY:10s}
    max-delivery-attempts: ${SIMULATION_MESSAGE_MAX_DELIVERY_ATTEMPTS:3}
    max-priority: ${SIMULATION_MESSAGE_MAX_PRIORITY:5}
    forward-confirm-timeout: ${SIMULATION_MESSAGE_FORWARD_CONFIRM_TIMEOUT:5s}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
